services:
  mongo:
    image: mongo:7
    container_name: fintrack-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: senha123
      MONGO_INITDB_DATABASE: fintrack
    volumes:
      - mongo-data:/data/db

  # Opcional: interface visual no navegador
  mongo-express:
    image: mongo-express
    container_name: fintrack-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: senha123
      ME_CONFIG_MONGODB_URL: mongodb://admin:senha123@mongo:27017/
    depends_on:
      - mongo

volumes:
  mongo-data:
